<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg2b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#0d180d"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg2b)"/>
  <!-- SEO / analytics graph theme — green accents -->
  <!-- Grid -->
  <line x1="80" y1="320" x2="580" y2="320" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="80" y1="260" x2="580" y2="260" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="80" y1="200" x2="580" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="80" y1="140" x2="580" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="80" y1="80" x2="580" y2="80" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Area fill under curve -->
  <polygon points="80,320 140,290 200,265 270,230 340,190 420,145 500,100 580,70 580,320" fill="rgba(34,197,94,0.04)"/>
  <!-- Rising trend line -->
  <polyline points="80,320 140,290 200,265 270,230 340,190 420,145 500,100 580,70" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.4"/>
  <!-- Data points -->
  <circle cx="80" cy="320" r="3" fill="rgba(34,197,94,0.4)"/>
  <circle cx="140" cy="290" r="3" fill="rgba(34,197,94,0.4)"/>
  <circle cx="200" cy="265" r="3" fill="rgba(34,197,94,0.4)"/>
  <circle cx="270" cy="230" r="3" fill="rgba(34,197,94,0.4)"/>
  <circle cx="340" cy="190" r="4" fill="rgba(34,197,94,0.5)"/>
  <circle cx="420" cy="145" r="4" fill="rgba(34,197,94,0.6)"/>
  <circle cx="500" cy="100" r="5" fill="rgba(34,197,94,0.7)"/>
  <circle cx="580" cy="70" r="6" fill="#22c55e" opacity="0.8"/>
  <!-- Glow at peak -->
  <circle cx="580" cy="70" r="25" fill="#22c55e" opacity="0.08"/>
  <!-- Rank badges -->
  <rect x="100" y="40" width="90" height="26" rx="13" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="116" y="58" font-family="sans-serif" font-size="11" fill="rgba(34,197,94,0.6)">#1 Rank</text>
  <rect x="210" y="40" width="100" height="26" rx="13" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <text x="222" y="58" font-family="sans-serif" font-size="11" fill="rgba(59,130,246,0.5)">+340% CTR</text>
  <!-- Magnifier icon -->
  <circle cx="520" cy="340" r="22" fill="none" stroke="rgba(34,197,94,0.15)" stroke-width="2"/>
  <line x1="535" y1="355" x2="548" y2="368" stroke="rgba(34,197,94,0.15)" stroke-width="2" stroke-linecap="round"/>
  <!-- Dot pattern -->
  <pattern id="b2dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.4" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="640" height="400" fill="url(#b2dots)"/>
</svg>
