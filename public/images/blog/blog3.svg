<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg3b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a14"/>
      <stop offset="100%" stop-color="#130f1e"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg3b)"/>
  <!-- Accessibility / waves theme — purple accents -->
  <!-- Concentric wave arcs -->
  <path d="M320,200 m-200,0 a200,120 0 0,1 400,0" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="1.5"/>
  <path d="M320,200 m-160,0 a160,96 0 0,1 320,0" fill="none" stroke="rgba(167,139,250,0.1)" stroke-width="1.5"/>
  <path d="M320,200 m-120,0 a120,72 0 0,1 240,0" fill="none" stroke="rgba(167,139,250,0.1)" stroke-width="1.5"/>
  <path d="M320,200 m-80,0 a80,48 0 0,1 160,0" fill="none" stroke="rgba(167,139,250,0.12)" stroke-width="1.5"/>
  <path d="M320,200 m-40,0 a40,24 0 0,1 80,0" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="2"/>
  <!-- Below-center waves -->
  <path d="M320,200 m-200,0 a200,120 0 0,0 400,0" fill="none" stroke="rgba(139,92,246,0.08)" stroke-width="1"/>
  <path d="M320,200 m-150,0 a150,90 0 0,0 300,0" fill="none" stroke="rgba(139,92,246,0.06)" stroke-width="1"/>
  <path d="M320,200 m-100,0 a100,60 0 0,0 200,0" fill="none" stroke="rgba(139,92,246,0.07)" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="320" cy="200" r="6" fill="rgba(167,139,250,0.5)"/>
  <circle cx="320" cy="200" r="12" fill="none" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <!-- Person silhouette (accessibility) -->
  <circle cx="320" cy="125" r="18" fill="rgba(139,92,246,0.1)" stroke="rgba(167,139,250,0.2)" stroke-width="1.5"/>
  <line x1="320" y1="143" x2="320" y2="185" stroke="rgba(167,139,250,0.2)" stroke-width="2"/>
  <line x1="295" y1="158" x2="345" y2="158" stroke="rgba(167,139,250,0.2)" stroke-width="2"/>
  <line x1="320" y1="185" x2="300" y2="205" stroke="rgba(167,139,250,0.15)" stroke-width="2"/>
  <line x1="320" y1="185" x2="340" y2="205" stroke="rgba(167,139,250,0.15)" stroke-width="2"/>
  <!-- WCAG badges -->
  <rect x="80" y="60" width="70" height="24" rx="12" fill="rgba(139,92,246,0.1)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <text x="95" y="76" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.5)">WCAG AA</text>
  <rect x="165" y="60" width="70" height="24" rx="12" fill="rgba(139,92,246,0.08)" stroke="rgba(167,139,250,0.15)" stroke-width="1"/>
  <text x="178" y="76" font-family="monospace" font-size="10" fill="rgba(167,139,250,0.4)">Level AAA</text>
  <!-- Corner marks -->
  <path d="M60,60 L60,40 L80,40" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="1.5"/>
  <path d="M580,60 L580,40 L560,40" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="1.5"/>
  <path d="M60,340 L60,360 L80,360" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="1.5"/>
  <path d="M580,340 L580,360 L560,360" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="1.5"/>
  <!-- Glow -->
  <circle cx="320" cy="200" r="120" fill="#7c3aed" opacity="0.04"/>
  <!-- Dot pattern -->
  <pattern id="b3dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.4" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="640" height="400" fill="url(#b3dots)"/>
</svg>
