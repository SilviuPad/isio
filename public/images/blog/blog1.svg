<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f0f22"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg1)"/>
  <!-- Circuit board pattern -->
  <!-- Horizontal traces -->
  <line x1="0" y1="80" x2="200" y2="80" stroke="rgba(59,130,246,0.08)" stroke-width="1.5"/>
  <line x1="240" y1="80" x2="400" y2="80" stroke="rgba(59,130,246,0.06)" stroke-width="1.5"/>
  <line x1="440" y1="80" x2="640" y2="80" stroke="rgba(59,130,246,0.05)" stroke-width="1.5"/>
  <line x1="0" y1="160" x2="150" y2="160" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>
  <line x1="200" y1="160" x2="400" y2="160" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>
  <line x1="480" y1="160" x2="640" y2="160" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
  <line x1="0" y1="240" x2="300" y2="240" stroke="rgba(59,130,246,0.06)" stroke-width="1.5"/>
  <line x1="380" y1="240" x2="640" y2="240" stroke="rgba(34,211,238,0.05)" stroke-width="1.5"/>
  <line x1="100" y1="320" x2="640" y2="320" stroke="rgba(59,130,246,0.04)" stroke-width="1"/>
  <!-- Vertical traces -->
  <line x1="200" y1="0" x2="200" y2="160" stroke="rgba(59,130,246,0.08)" stroke-width="1.5"/>
  <line x1="400" y1="80" x2="400" y2="320" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>
  <line x1="150" y1="160" x2="150" y2="320" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="240" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>
  <line x1="300" y1="240" x2="300" y2="400" stroke="rgba(34,211,238,0.05)" stroke-width="1"/>
  <!-- Nodes (solder points) -->
  <circle cx="200" cy="80" r="4" fill="rgba(59,130,246,0.3)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <circle cx="400" cy="80" r="4" fill="rgba(34,211,238,0.2)" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
  <circle cx="400" cy="160" r="3" fill="rgba(59,130,246,0.2)"/>
  <circle cx="150" cy="160" r="3" fill="rgba(59,130,246,0.2)"/>
  <circle cx="480" cy="160" r="3" fill="rgba(34,211,238,0.2)"/>
  <circle cx="300" cy="240" r="4" fill="rgba(34,211,238,0.25)" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
  <circle cx="150" cy="240" r="3" fill="rgba(59,130,246,0.15)"/>
  <circle cx="400" cy="240" r="3" fill="rgba(59,130,246,0.15)"/>
  <circle cx="400" cy="320" r="3" fill="rgba(34,211,238,0.15)"/>
  <circle cx="300" cy="320" r="3" fill="rgba(59,130,246,0.15)"/>
  <!-- AI chip center -->
  <rect x="270" y="155" width="100" height="90" rx="4" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1.5"/>
  <rect x="282" y="167" width="76" height="66" rx="2" fill="rgba(59,130,246,0.05)"/>
  <text x="288" y="207" font-family="monospace" font-size="13" fill="rgba(59,130,246,0.5)">AI</text>
  <!-- Glow -->
  <circle cx="320" cy="200" r="80" fill="#3b82f6" opacity="0.04"/>
  <circle cx="320" cy="200" r="40" fill="#22d3ee" opacity="0.03"/>
  <!-- Dot pattern -->
  <pattern id="b1dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="0.4" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="640" height="400" fill="url(#b1dots)"/>
</svg>
