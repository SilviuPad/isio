<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0f0f18"/>
  <!-- Neural network nodes -->
  <!-- Layer 1 (input) -->
  <circle cx="120" cy="100" r="8" fill="rgba(59,130,246,0.3)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <circle cx="120" cy="200" r="8" fill="rgba(59,130,246,0.3)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <circle cx="120" cy="300" r="8" fill="rgba(59,130,246,0.3)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <!-- Layer 2 -->
  <circle cx="280" cy="120" r="10" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <circle cx="280" cy="200" r="10" fill="rgba(34,211,238,0.2)" stroke="rgba(34,211,238,0.4)" stroke-width="1"/>
  <circle cx="280" cy="280" r="10" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>
  <!-- Layer 3 -->
  <circle cx="420" cy="150" r="12" fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.3)" stroke-width="1.5"/>
  <circle cx="420" cy="250" r="12" fill="rgba(34,211,238,0.15)" stroke="rgba(34,211,238,0.3)" stroke-width="1.5"/>
  <!-- Output -->
  <circle cx="540" cy="200" r="14" fill="rgba(34,211,238,0.2)" stroke="rgba(34,211,238,0.5)" stroke-width="2"/>
  <!-- Connections L1->L2 -->
  <line x1="128" y1="100" x2="270" y2="120" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
  <line x1="128" y1="100" x2="270" y2="200" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
  <line x1="128" y1="100" x2="270" y2="280" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
  <line x1="128" y1="200" x2="270" y2="120" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
  <line x1="128" y1="200" x2="270" y2="200" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
  <line x1="128" y1="200" x2="270" y2="280" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
  <line x1="128" y1="300" x2="270" y2="120" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
  <line x1="128" y1="300" x2="270" y2="200" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
  <line x1="128" y1="300" x2="270" y2="280" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
  <!-- Connections L2->L3 -->
  <line x1="290" y1="120" x2="408" y2="150" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <line x1="290" y1="120" x2="408" y2="250" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>
  <line x1="290" y1="200" x2="408" y2="150" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <line x1="290" y1="200" x2="408" y2="250" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <line x1="290" y1="280" x2="408" y2="150" stroke="rgba(34,211,238,0.06)" stroke-width="1"/>
  <line x1="290" y1="280" x2="408" y2="250" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <!-- Connections L3->Output -->
  <line x1="432" y1="150" x2="526" y2="200" stroke="rgba(34,211,238,0.15)" stroke-width="1.5"/>
  <line x1="432" y1="250" x2="526" y2="200" stroke="rgba(34,211,238,0.15)" stroke-width="1.5"/>
  <!-- Glow on output -->
  <circle cx="540" cy="200" r="40" fill="#22d3ee" opacity="0.05"/>
  <!-- Pulse rings -->
  <circle cx="540" cy="200" r="24" fill="none" stroke="rgba(34,211,238,0.1)" stroke-width="1"/>
  <circle cx="540" cy="200" r="34" fill="none" stroke="rgba(34,211,238,0.05)" stroke-width="1"/>
  <!-- Dot bg -->
  <pattern id="ndots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.4" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="640" height="400" fill="url(#ndots)"/>
</svg>
