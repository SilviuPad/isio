<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0f0f18"/>
  <!-- Grid lines -->
  <line x1="100" y1="350" x2="540" y2="350" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="100" y1="280" x2="540" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="100" y1="210" x2="540" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="100" y1="140" x2="540" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="100" y1="70" x2="540" y2="70" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Y axis -->
  <line x1="100" y1="50" x2="100" y2="360" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Rising bars -->
  <rect x="120" y="300" width="35" height="50" rx="4" fill="rgba(59,130,246,0.15)"/>
  <rect x="175" y="270" width="35" height="80" rx="4" fill="rgba(59,130,246,0.2)"/>
  <rect x="230" y="240" width="35" height="110" rx="4" fill="rgba(59,130,246,0.25)"/>
  <rect x="285" y="200" width="35" height="150" rx="4" fill="rgba(59,130,246,0.3)"/>
  <rect x="340" y="170" width="35" height="180" rx="4" fill="rgba(59,130,246,0.35)"/>
  <rect x="395" y="130" width="35" height="220" rx="4" fill="rgba(34,211,238,0.3)"/>
  <rect x="450" y="100" width="35" height="250" rx="4" fill="rgba(34,211,238,0.35)"/>
  <rect x="505" y="80" width="35" height="270" rx="4" fill="rgba(34,211,238,0.4)"/>
  <!-- Trend line -->
  <polyline points="137,290 192,260 247,225 302,185 357,155 412,115 467,85 522,65" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <!-- Glow at peak -->
  <circle cx="522" cy="65" r="6" fill="#22d3ee" opacity="0.8"/>
  <circle cx="522" cy="65" r="30" fill="#22d3ee" opacity="0.1"/>
  <!-- Label -->
  <text x="478" y="55" font-family="sans-serif" font-size="11" fill="#22d3ee" opacity="0.7">+340%</text>
  <!-- Search icon hint -->
  <circle cx="180" cy="60" r="18" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <line x1="192" y1="72" x2="200" y2="80" stroke="rgba(59,130,246,0.15)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
