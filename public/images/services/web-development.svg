<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#161625"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  <rect width="640" height="400" fill="url(#bg)"/>
  <rect width="640" height="400" fill="url(#dots)"/>
  <!-- Code brackets -->
  <text x="80" y="120" font-family="monospace" font-size="72" fill="url(#accent)" opacity="0.3">&lt;/&gt;</text>
  <text x="320" y="200" font-family="monospace" font-size="96" fill="url(#accent)" opacity="0.15">{ }</text>
  <text x="150" y="300" font-family="monospace" font-size="48" fill="#3b82f6" opacity="0.2">const</text>
  <text x="400" y="140" font-family="monospace" font-size="36" fill="#22d3ee" opacity="0.15">async</text>
  <!-- Floating lines -->
  <line x1="100" y1="340" x2="300" y2="340" stroke="#3b82f6" stroke-width="2" opacity="0.2"/>
  <line x1="320" y1="340" x2="420" y2="340" stroke="#22d3ee" stroke-width="2" opacity="0.15"/>
  <line x1="100" y1="360" x2="250" y2="360" stroke="#3b82f6" stroke-width="2" opacity="0.1"/>
  <!-- Glow circle -->
  <circle cx="480" cy="180" r="80" fill="#3b82f6" opacity="0.05"/>
  <!-- Terminal cursor blink indicator -->
  <rect x="100" y="50" width="440" height="300" rx="8" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <rect x="100" y="50" width="440" height="28" rx="8" fill="rgba(255,255,255,0.02)"/>
  <circle cx="120" cy="64" r="4" fill="#ef4444" opacity="0.4"/>
  <circle cx="136" cy="64" r="4" fill="#eab308" opacity="0.4"/>
  <circle cx="152" cy="64" r="4" fill="#22c55e" opacity="0.4"/>
</svg>
