<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#161625"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#bg2)"/>
  <!-- App window frame -->
  <rect x="80" y="60" width="480" height="280" rx="12" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="80" y="60" width="480" height="40" rx="12" fill="rgba(255,255,255,0.03)"/>
  <circle cx="110" cy="80" r="5" fill="#ef4444" opacity="0.5"/>
  <circle cx="130" cy="80" r="5" fill="#eab308" opacity="0.5"/>
  <circle cx="150" cy="80" r="5" fill="#22c55e" opacity="0.5"/>
  <!-- Sidebar -->
  <rect x="80" y="100" width="120" height="240" fill="rgba(255,255,255,0.02)"/>
  <rect x="100" y="120" width="80" height="8" rx="4" fill="rgba(59,130,246,0.3)"/>
  <rect x="100" y="145" width="60" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="100" y="165" width="70" height="6" rx="3" fill="rgba(255,255,255,0.05)"/>
  <rect x="100" y="185" width="50" height="6" rx="3" fill="rgba(255,255,255,0.05)"/>
  <rect x="100" y="210" width="65" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
  <rect x="100" y="230" width="55" height="6" rx="3" fill="rgba(255,255,255,0.04)"/>
  <!-- Content cards -->
  <rect x="220" y="120" width="150" height="90" rx="8" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
  <rect x="390" y="120" width="150" height="90" rx="8" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <!-- Card labels -->
  <rect x="234" y="138" width="60" height="6" rx="3" fill="rgba(59,130,246,0.4)"/>
  <rect x="234" y="155" width="100" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="234" y="168" width="80" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="404" y="138" width="50" height="6" rx="3" fill="rgba(34,211,238,0.4)"/>
  <rect x="404" y="155" width="90" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="404" y="168" width="70" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <!-- Chart bars -->
  <rect x="230" y="240" width="20" height="80" rx="4" fill="rgba(59,130,246,0.2)"/>
  <rect x="260" y="260" width="20" height="60" rx="4" fill="rgba(59,130,246,0.3)"/>
  <rect x="290" y="230" width="20" height="90" rx="4" fill="rgba(59,130,246,0.25)"/>
  <rect x="320" y="250" width="20" height="70" rx="4" fill="rgba(34,211,238,0.3)"/>
  <rect x="350" y="220" width="20" height="100" rx="4" fill="rgba(34,211,238,0.2)"/>
  <!-- Glow -->
  <circle cx="350" cy="180" r="100" fill="#3b82f6" opacity="0.04"/>
</svg>
