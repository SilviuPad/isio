<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0f0f18"/>
  <!-- Large eye shape -->
  <ellipse cx="320" cy="200" rx="200" ry="120" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <ellipse cx="320" cy="200" rx="160" ry="96" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
  <ellipse cx="320" cy="200" rx="220" ry="132" fill="none" stroke="rgba(59,130,246,0.07)" stroke-width="1"/>
  <!-- Iris -->
  <circle cx="320" cy="200" r="60" fill="none" stroke="rgba(34,211,238,0.2)" stroke-width="2"/>
  <circle cx="320" cy="200" r="40" fill="rgba(59,130,246,0.08)"/>
  <circle cx="320" cy="200" r="20" fill="rgba(34,211,238,0.15)"/>
  <circle cx="320" cy="200" r="8" fill="rgba(34,211,238,0.4)"/>
  <!-- Highlight -->
  <circle cx="308" cy="190" r="3" fill="rgba(255,255,255,0.3)"/>
  <!-- WCAG text -->
  <text x="195" y="356" font-family="monospace" font-size="14" fill="rgba(59,130,246,0.25)">WCAG 2.1 AA</text>
  <text x="374" y="356" font-family="monospace" font-size="14" fill="rgba(34,211,238,0.18)">Level AAA</text>
  <!-- Scanning lines -->
  <line x1="120" y1="200" x2="255" y2="200" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <line x1="385" y1="200" x2="520" y2="200" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <!-- Corner marks -->
  <path d="M150,120 L150,100 L170,100" fill="none" stroke="rgba(34,211,238,0.2)" stroke-width="1.5"/>
  <path d="M490,120 L490,100 L470,100" fill="none" stroke="rgba(34,211,238,0.2)" stroke-width="1.5"/>
  <path d="M150,280 L150,300 L170,300" fill="none" stroke="rgba(34,211,238,0.2)" stroke-width="1.5"/>
  <path d="M490,280 L490,300 L470,300" fill="none" stroke="rgba(34,211,238,0.2)" stroke-width="1.5"/>
  <!-- Dot pattern -->
  <pattern id="adots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.4" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="640" height="400" fill="url(#adots)"/>
</svg>
