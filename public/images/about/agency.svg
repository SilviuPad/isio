<svg xmlns="http://www.w3.org/2000/svg" width="480" height="600" viewBox="0 0 480 600">
  <defs>
    <pattern id="dots3" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <linearGradient id="fadeBottom3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f18" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect width="480" height="600" fill="#0f0f18"/>
  <rect width="480" height="600" fill="url(#dots3)"/>
  <!-- Monitor -->
  <rect x="120" y="180" width="240" height="160" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <rect x="130" y="190" width="220" height="130" rx="4" fill="rgba(59,130,246,0.05)"/>
  <!-- Code lines on screen -->
  <rect x="145" y="210" width="80" height="4" rx="2" fill="rgba(59,130,246,0.3)"/>
  <rect x="145" y="225" width="120" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
  <rect x="145" y="240" width="60" height="4" rx="2" fill="rgba(34,211,238,0.25)"/>
  <rect x="145" y="255" width="140" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="145" y="270" width="90" height="4" rx="2" fill="rgba(59,130,246,0.2)"/>
  <rect x="145" y="285" width="110" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
  <rect x="145" y="300" width="70" height="4" rx="2" fill="rgba(34,211,238,0.15)"/>
  <!-- Cursor blink effect -->
  <rect x="145" y="312" width="8" height="4" rx="1" fill="rgba(34,211,238,0.5)"/>
  <!-- Monitor stand -->
  <rect x="220" y="340" width="40" height="30" fill="rgba(255,255,255,0.03)"/>
  <rect x="190" y="370" width="100" height="6" rx="3" fill="rgba(255,255,255,0.05)"/>
  <!-- Lightning bolt / power symbol -->
  <path d="M230,80 L250,80 L240,130 L270,130 L220,200 L235,145 L210,145 Z" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <!-- Floating UI elements -->
  <circle cx="380" cy="120" r="20" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>
  <circle cx="100" cy="450" r="30" fill="rgba(59,130,246,0.05)" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
  <!-- Small decorative circles -->
  <circle cx="380" cy="400" r="8" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <circle cx="90" cy="200" r="12" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>
  <!-- Est. 2020 text -->
  <text x="175" y="480" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.15)">Est. 2020</text>
  <!-- Corner brackets -->
  <path d="M40,40 L40,20 L60,20" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <path d="M440,40 L440,20 L420,20" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <path d="M40,560 L40,580 L60,580" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <path d="M440,560 L440,580 L420,580" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="1.5"/>
  <!-- Bottom gradient fade -->
  <rect x="0" y="500" width="480" height="100" fill="url(#fadeBottom3)"/>
</svg>
